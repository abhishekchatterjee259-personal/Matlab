name: MATLAB CI

on:
  push:
    branches: [main, Dev, Test-Matlab-CI/CD]
  pull_request:
    branches: [main, Dev, Test-Matlab-CI/CD]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MATLAB with toolboxes
        uses: matlab-actions/setup-matlab@v1
        with:
          products: |
            Simulink
            Simulink Check
            Simulink Test
            Embedded Coder

      - name: Verify MATLAB installation
        uses: matlab-actions/run-command@v1
        with:
          command: |
            disp('MATLAB CI pipeline is working!');

      - name: Load MATLAB project
        uses: matlab-actions/run-command@v1
        with:
          command: |
            proj = matlab.project.loadProject(fullfile(pwd,'Matlab.prj'));
            disp(['Loaded project: ', proj.Name]);

      - name: Run Process Advisor checks (if available)
        uses: matlab-actions/run-command@v1
        with:
          command: |
            proj = matlab.project.loadProject(fullfile(pwd,'Matlab.prj'));
            if exist('padv.ProcessModel','class')
                pm = padv.ProcessModel();
                processmodel(pm);
                results = pm.runAll();
                disp('Process Advisor checks completed.');
                disp(results);
                % Ensure results folder exists in runner workspace
                resultsDir = fullfile(pwd,'PA_Results');
                if ~exist(resultsDir,'dir')
                    mkdir(resultsDir);
                end
                disp(['Saving results to: ', resultsDir]);
                dir(resultsDir); % Debug: show folder contents
                save(fullfile(resultsDir,'ci_results.mat'),'results');
            else
                warning('Process Advisor not available in this environment. Skipping checks.');
                % Create dummy file so artifact step always has something
                resultsDir = fullfile(pwd,'PA_Results');
                if ~exist(resultsDir,'dir')
                    mkdir(resultsDir);
                end
                fid = fopen(fullfile(resultsDir,'dummy.txt'),'w');
                fprintf(fid,'Process Advisor not available in this run.');
                fclose(fid);
            end

      - name: Upload Process Advisor results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PA_Results
          path: PA_Results
